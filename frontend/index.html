<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤖 O Postador - AI Agent</title>

<style>

body{
font-family:sans-serif;
background:#f2f2f2;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#container{
width:100%;
max-width:600px;
height:90vh;
background:white;
display:flex;
flex-direction:column;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.1);
overflow:hidden;
}

#chat{
flex:1;
padding:10px;
overflow-y:auto;
display:flex;
flex-direction:column;
}

.msg{
max-width:80%;
margin-bottom:10px;
padding:10px 15px;
border-radius:20px;
}

.user{
align-self:flex-end;
background:#0084ff;
color:white;
}

.bot{
align-self:flex-start;
background:#e5e5ea;
}

#input-area{
display:flex;
padding:10px;
border-top:1px solid #ddd;
}

#msg{
flex:1;
padding:10px;
font-size:16px;
border-radius:20px;
border:1px solid #ccc;
}

button{
margin-left:10px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#0084ff;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div id="container">

<div id="chat"></div>

<div style="padding:10px;background:#f9f9f9;text-align:center;font-size:14px">

👋 Olá! Eu sou <b>O Postador 🤖</b><br>
Digite um tema e eu crio um post.

</div>

<div id="input-area">

<input id="msg" placeholder="Digite o tema do post"
onkeydown="if(event.key==='Enter') enviar()">

<button onclick="enviar()">Enviar</button>

</div>

<div style="text-align:center;padding:8px;font-size:13px;color:#aaa">

Powered by T2K

</div>

</div>

<script src="app.js"></script>

</body>
</html>
