<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🤖 O Postador - AI Agent</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<div id="container">


<!-- idioma -->

<div id="lang" style="text-align:right;padding:8px;font-size:14px">

<button onclick="setLang('pt')">🇧🇷 PT</button>
<button onclick="setLang('en')">🇺🇸 EN</button>

</div>


<!-- chat -->

<div id="chat"></div>


<!-- mensagem inicial -->

<div style="padding:10px;background:#f9f9f9;text-align:center;font-size:14px">

<div id="welcome"></div>

</div>


<!-- input -->

<div id="input-area">

<input
id="msg"
placeholder=""
onkeydown="if(event.key==='Enter') enviar()"
>

<button id="sendBtn" onclick="enviar()"></button>

</div>


<!-- footer -->

<div style="text-align:center;padding:8px;font-size:13px;color:#aaa">

Powered by <b>Klauber Fischer</b> — T2K

</div>


</div>


<script src="app.js"></script>

</body>

</html>
