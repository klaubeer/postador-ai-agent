<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Postador — Crie posts com IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

  <!-- header -->
  <header id="header">
    <div id="logo">
      <span class="logo-icon">◆</span>
      <span class="logo-text">Postador</span>
    </div>
    <button id="resetBtn" onclick="recomecar()" title="Nova conversa">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 1 3.3-6.9"/>
        <path d="M3 3v5h5"/>
      </svg>
    </button>
  </header>

  <!-- chat -->
  <main id="chat">
    <div class="msg bot">
      <div class="msg-content">
        Oi! Eu sou o <strong>Postador</strong> — te ajudo a criar posts incríveis para redes sociais.<br><br>
        Me conta: o que você quer divulgar?
      </div>
    </div>
  </main>

  <!-- input -->
  <div id="input-area">
    <div id="input-wrapper">
      <input
        id="msg"
        type="text"
        placeholder="Descreva o que você quer postar..."
        autocomplete="off"
      >
      <button id="sendBtn" onclick="enviar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div id="footer">
      Feito por <strong>Klauber Fischer</strong>
    </div>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
